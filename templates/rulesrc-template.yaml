# =============================================================================
# .rulesrc.yaml - Configuration Template
# =============================================================================
# Place this file in your project root to customize workflow behavior.
# The workflow reads this file during Stage 0 (User Preferences).
# All fields are optional - defaults are used when omitted.
# =============================================================================

# --- Target Platforms ---------------------------------------------------------
# Which AI tools to generate files for.
# Options: cursor, claude, antigravity, gemini, codex, kiro, copilot, opencode, adal
# If set, this overrides AI-tool auto-detection.
# Default: auto-detect from existing files, fallback to [cursor, codex]
target_platforms:
  - cursor
  - codex

# --- Severity Level -----------------------------------------------------------
# How strict should the generated rules be?
# strict   = more critical rules, fewer soft suggestions
# balanced = default mix of critical and important guidance
# relaxed  = fewer blocking rules, more notes and examples
severity_level: balanced

# --- Output Language ----------------------------------------------------------
# Language for generated documentation comments and descriptions.
# Code examples remain in the original programming language.
# Options: en, th, ja, zh, ko, es, fr, de, pt
# Default: en
output_language: en

# --- Sections ----------------------------------------------------------------
# Include or exclude optional sections in generated files.
# Required sections stay present regardless of this filter.
# Default: all optional sections included
sections:
  include:
    - project-identity
    - coding-standards
    - critical-rules
    - important-guidelines
    - code-smells
    - testing
  exclude: []
    # Uncomment to exclude optional sections:
    # - security
    # - accessibility
    # - i18n
    # - git-workflow
    # - performance
    # - api-design

# --- Skill Sources ------------------------------------------------------------
# Override automatic skill-source discovery roots.
# If omitted, the workflow scans the project-local `.agent/` directory.
# Paths may be relative to the project root or absolute.
# Roots are scanned in the order listed here, so shared roots should come first.
# Duplicate source names prefer the first matching root.
# `format` is optional; if provided, the workflow trusts it and skips inference.
# Keep `.agent/skills` as the default Antigravity CATALOG target for backward compatibility.
# Hybrid skill directories may include `SKILL.md` with companion `AGENTS.md`, `CLAUDE.md`,
# `README.md`, and adjacent `references/` or `rules/` folders.
# skill_sources:
#   - path: "C:/Users/narav/Desktop/CE code/Tools/.agent"
#   - path: .agent

# --- Custom Keywords ----------------------------------------------------------
# Additional keywords to search for during skill discovery (Stage 2).
# These are merged with auto-detected keywords from your tech stack with case-insensitive dedupe.
custom_keywords:
  # - microservices
  # - event-driven
  # - real-time
  # - cqrs

# --- Template Style -----------------------------------------------------------
# How to structure the generated files.
# progressive = overview -> details (default)
# flat        = same content scope with shallower headings and fewer long examples
# minimal     = essential sections only, tuned for shorter outputs
# Options: progressive, flat, minimal
template_style: progressive

# --- Quality Threshold --------------------------------------------------------
# Minimum quality score to pass verification (Stage 5).
# Validation scripts use this threshold unless a CLI threshold overrides it.
# Scale: 0-50, Default: 38
quality_threshold: 38

# --- Preview Mode -------------------------------------------------------------
# Show a preview of the planned structure before writing files.
# Default: false
preview_mode: false

# --- Existing Files -----------------------------------------------------------
# What to do if output files already exist.
# merge = diff-based update guidance that preserves user customizations
# Options: ask, overwrite, merge, skip
# Default: ask
existing_files: ask
